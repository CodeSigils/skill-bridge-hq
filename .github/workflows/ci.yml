name: validate

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'skills/**/*.md'
      - 'docs/**'
      - '.github/workflows/ci.yml'
      - '.github/scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**/*.md'
      - 'docs/**'
      - '.github/workflows/ci.yml'
      - '.github/scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for Hermes-specific references
        run: python .github/scripts/ci-check.py
      - name: Validate docs frontmatter
        run: python .github/scripts/validate-docs.py
